name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest src/tests.py -v

  smoke-test:
    name: Smoke test via Docker Compose
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Start API
        run: docker compose up api --build --detach

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is up"
              exit 0
            fi
            echo "Attempt $i/15 — retrying in 5s"
            sleep 5
          done
          echo "API never became healthy"
          docker compose logs api
          exit 1

      - name: Health check
        run: curl --fail http://localhost:8000/health

      - name: Predict endpoint check
        run: |
          curl --fail --max-time 15 \
            --header "Content-Type: application/json" \
            --data '{
              "crop": "Rice",
              "data": {
                "rain (mm)": 534.0,
                "temp (C)": 14.74,
                "Year": 2013,
                "pesticides_tonnes": 45177.18,
                "Area": "Australia",
                "Days_to_Harvest": 104,
                "Irrigation_Used": true,
                "Fertilizer_Used": true,
                "Soil_Type": "Silt"
              }
            }' \
            http://localhost:8000/predict \
          | grep -q '"yield"'

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    name: Trigger Dockhand deployment
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger webhook
        env:
          SECRET: ${{ secrets.DOCKHAND_WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.DOCKHAND_WEBHOOK_URL }}
        run: |
          PAYLOAD='{}'
          SIGNATURE="sha256=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | awk '{print $NF}')"
          curl --fail --max-time 10 \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-Hub-Signature-256: $SIGNATURE" \
            --data "$PAYLOAD" \
            "$WEBHOOK_URL"