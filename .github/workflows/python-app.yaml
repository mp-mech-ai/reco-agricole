name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: DISABLE_RATE_LIMIT=true uv run pytest src/tests.py -v

  smoke-test:
    name: Smoke test via Docker Compose
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Start API
        run: docker compose up api --build --detach

      - name: Wait for API to be healthy
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "API is up"
              exit 0
            fi
            echo "Attempt $i/15 — retrying in 5s"
            sleep 5
          done
          echo "API never became healthy"
          docker compose logs api
          exit 1

      - name: Health check
        run: curl --fail http://localhost:8000/health

      - name: Predict endpoint check
        run: |
          curl --fail --max-time 15 \
            --header "Content-Type: application/json" \
            --data '{
              "crop": "Rice",
              "data": {
                "rain (mm)": 534.0,
                "temp (C)": 14.74,
                "Year": 2013,
                "pesticides_tonnes": 45177.18,
                "Area": "Australia",
                "Days_to_Harvest": 104,
                "Irrigation_Used": true,
                "Fertilizer_Used": true,
                "Soil_Type": "Silt"
              }
            }' \
            http://localhost:8000/predict \
          | grep -q '"yield"'

      - name: Tear down
        if: always()
        run: docker compose down

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SVC_ACCOUNT_CREDS }}" | base64 --decode > $GOOGLE_APPLICATION_CREDENTIALS
          gcloud auth activate-service-account $SVC_ACCOUNT_EMAIL --key-file=$GOOGLE_APPLICATION_CREDENTIALS
          gcloud config set project $PROJECT_ID
          gcloud config set functions/region $REGION

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build & push API
        run: |
          docker build -f Dockerfile.api \
            -t europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/api:${{ github.sha }} .
          docker push europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/api:${{ github.sha }}

      - name: Build & push webapp
        run: |
          docker build -f Dockerfile.webapp \
            -t europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/webapp:${{ github.sha }} .
          docker push europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/webapp:${{ github.sha }}

      - name: Deploy API
        run: |
          gcloud run deploy api \
            --image europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/api:${{ github.sha }} \
            --region europe-west1 --platform managed

      - name: Deploy webapp
        run: |
          gcloud run deploy webapp \
            --image europe-west1-docker.pkg.dev/reco-agricole/reco-agricole/webapp:${{ github.sha }} \
            --region europe-west1 --platform managed \
            --set-env-vars API_URL=${{ secrets.API_URL }}